  <line x1="100" y1="60" x2="100" y2="182" stroke="#cc9900" stroke-width="1" opacity="0.15" clip-path="url(#bc4)"/>
  <line x1="130" y1="65" x2="136" y2="178" stroke="#cc9900" stroke-width="1" opacity="0.2" clip-path="url(#bc4)"/>
