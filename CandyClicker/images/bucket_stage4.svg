  <ellipse cx="70" cy="54" rx="7" ry="5.5" fill="#ff8800"/><ellipse cx="70" cy="54" rx="7" ry="2.5" fill="#fff" opacity="0.4"/>
  <ellipse cx="85" cy="55" rx="6.5" ry="5" fill="#ee44aa"/><ellipse cx="85" cy="55" rx="6.5" ry="2" fill="#fff" opacity="0.35"/>
  <ellipse cx="100" cy="54" rx="7" ry="5.5" fill="#9922ee"/><ellipse cx="100" cy="54" rx="7" ry="2.5" fill="#fff" opacity="0.4"/>
  <ellipse cx="115" cy="55" rx="6.5" ry="5" fill="#00ccff"/><ellipse cx="115" cy="55" rx="6.5" ry="2" fill="#fff" opacity="0.35"/>
  <ellipse cx="130" cy="54" rx="7" ry="5.5" fill="#22ee44"/><ellipse cx="130" cy="54" rx="7" ry="2.5" fill="#fff" opacity="0.4"/>
  <ellipse cx="145" cy="56" rx="6" ry="4.5" fill="#ff6600"/>
