<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <radialGradient id="r4" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffe566"/><stop offset="35%" stop-color="#ffcc00"/><stop offset="75%" stop-color="#dd9900"/><stop offset="100%" stop-color="#aa6600"/>
    </radialGradient>
    <linearGradient id="shine4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.3"/><stop offset="18%" stop-color="#fff" stop-opacity="0.4"/><stop offset="35%" stop-color="#fff" stop-opacity="0.12"/><stop offset="100%" stop-color="#000" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="rim4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffcc"/><stop offset="40%" stop-color="#ffee88"/><stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <radialGradient id="goldenGlow" cx="50%" cy="50%" r="50%">
