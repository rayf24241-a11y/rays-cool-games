  <path d="M68,48 Q100,12 132,48" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <circle cx="68" cy="50" r="8" fill="#ffdd44" stroke="#cc9900" stroke-width="2"/>
  <circle cx="68" cy="48" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="132" cy="50" r="8" fill="#ffdd44" stroke="#cc9900" stroke-width="2"/>
  <circle cx="132" cy="48" r="3" fill="#fff" opacity="0.4"/>
  <!-- Golden body -->
