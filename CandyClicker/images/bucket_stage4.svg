    <filter id="goldBlur"><feGaussianBlur stdDeviation="3"/></filter>
    <clipPath id="bc4"><polygon points="38,55 162,55 148,185 52,185"/></clipPath>
  </defs>
  <!-- Large golden glow -->
  <ellipse cx="100" cy="120" rx="90" ry="85" fill="url(#goldenGlow)"/>
