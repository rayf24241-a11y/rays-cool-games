<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candy Clicker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="wrapper">

    <!-- LEFT PANEL: Stats -->
    <div id="sectionLeft">
      <h2>🍬 Candy Stats</h2>
      <div class="stat-box">
        <p>Total Candy: <span id="totalCandy">0</span></p>
        <p>Per Click: <span id="perClick">1</span></p>
        <p>Per Second: <span id="perSecond">0</span></p>
      </div>
      <h3>Buildings Owned</h3>
      <ul id="ownedList"></ul>
    </div>

    <div class="separator sep-left"></div>

    <!-- MIDDLE PANEL: Clicker -->
    <div id="sectionMiddle">
      <div id="candyCounter">
        <span id="candyDisplay">0</span> candies
      </div>
      <div id="cpsDisplay">per second: <span id="cpsNum">0</span></div>

      <div id="clickerArea">
        <img
          id="bucket"
          src="IMAGES/clicker/candy_bucket.png"
          alt="Click the candy bucket!"
          draggable="false"
        >
      </div>
    </div>

    <div class="separator sep-right"></div>

    <!-- RIGHT PANEL: Shop -->
    <div id="sectionRight">
      <h2>🏪 Shop</h2>

      <div class="shop-section">
        <h3>Upgrades</h3>
        <div id="upgradeList"></div>
      </div>

      <div class="shop-section">
        <h3>Buildings</h3>
        <div id="buildingList"></div>
      </div>
    </div>

  </div>

  <!-- Floating candy animations -->
  <div id="floatingContainer"></div>

  <script>
    // ============================================================
    //  CANDY CLICKER - GAME ENGINE
    // ============================================================

    // ====== GAME STATE ======
    let candy = 0;
    let candyPerClick = 1;
    let candyPerSecond = 0;
    let totalCandy = 0;

    // ====== BUILDINGS ======
    const buildings = [
      { name: "Trick-or-Treater",   baseCost: 15,      cps: 0.1,    owned: 0, icon: "🧒" },
      { name: "Candy Bowl",         baseCost: 100,     cps: 1,      owned: 0, icon: "🍬" },
      { name: "Candy Corn Farm",    baseCost: 1100,    cps: 8,      owned: 0, icon: "🌽" },
      { name: "Chocolate Factory",  baseCost: 12000,   cps: 47,     owned: 0, icon: "🏭" },
      { name: "Sugar Mine",         baseCost: 130000,  cps: 260,    owned: 0, icon: "⛏️" },
      { name: "Gummy Lab",          baseCost: 1400000, cps: 1400,   owned: 0, icon: "🧪" },
    ];

    // ====== UPGRADES ======
    const upgrades = [
      { name: "Sticky Fingers",  cost: 100,     mult: 2, req: 1,   bought: false, desc: "Clicking is 2x sweeter" },
      { name: "Sugar Rush",      cost: 500,     mult: 2, req: 1,   bought: false, desc: "Another 2x click power" },
      { name: "Caramel Coating", cost: 10000,   mult: 2, req: 5,   bought: false, desc: "Yet another 2x click power" },
      { name: "Golden Wrapper",  cost: 100000,  mult: 2, req: 25,  bought: false, desc: "2x click power again!" },
      { name: "Haunted Bucket",  cost: 1000000, mult: 3, req: 100, bought: false, desc: "3x click power... spooky" },
    ];

    // ====== DOM REFS ======
    const candyDisplay   = document.getElementById("candyDisplay");
    const cpsNum         = document.getElementById("cpsNum");
    const totalCandyEl   = document.getElementById("totalCandy");
    const perClickEl     = document.getElementById("perClick");
    const perSecondEl    = document.getElementById("perSecond");
    const ownedList      = document.getElementById("ownedList");
    const buildingListEl = document.getElementById("buildingList");
    const upgradeListEl  = document.getElementById("upgradeList");
    const bucket         = document.getElementById("bucket");
    const floatContainer = document.getElementById("floatingContainer");

    // ====== FORMAT NUMBERS ======
    function fmt(n) {
      if (n >= 1e12) return (n / 1e12).toFixed(1) + " trillion";
      if (n >= 1e9)  return (n / 1e9).toFixed(1) + " billion";
      if (n >= 1e6)  return (n / 1e6).toFixed(1) + " million";
      if (n >= 1e3)  return (n / 1e3).toFixed(1) + "k";
      return Math.floor(n).toLocaleString();
    }

    // ====== GET BUILDING COST ======
    function getBuildingCost(b) {
      return Math.ceil(b.baseCost * Math.pow(1.15, b.owned));
    }

    // ====== UPDATE UI ======
    function updateUI() {
      candyDisplay.textContent = fmt(candy);
      cpsNum.textContent       = fmt(candyPerSecond);
      totalCandyEl.textContent = fmt(totalCandy);
      perClickEl.textContent   = fmt(candyPerClick);
      perSecondEl.textContent  = fmt(candyPerSecond);
      renderBuildings();
      renderUpgrades();
      renderOwned();
    }

    // ====== RENDER BUILDINGS ======
    function renderBuildings() {
      buildingListEl.innerHTML = "";
      buildings.forEach((b, i) => {
        const cost   = getBuildingCost(b);
        const canBuy = candy >= cost;
        const div    = document.createElement("div");
        div.className = "shop-item" + (canBuy ? " affordable" : " locked");
        div.innerHTML = `
          <span class="shop-icon">${b.icon}</span>
          <div class="shop-info">
            <strong>${b.name}</strong>
            <span class="shop-cost">🍬 ${fmt(cost)}</span>
          </div>
          <span class="shop-owned">${b.owned}</span>
        `;
        div.addEventListener("click", () => buyBuilding(i));
        buildingListEl.appendChild(div);
      });
    }

    // ====== RENDER UPGRADES ======
    function renderUpgrades() {
      upgradeListEl.innerHTML = "";
      upgrades.forEach((u, i) => {
        if (u.bought) return;
        const canBuy = candy >= u.cost;
        const div    = document.createElement("div");
        div.className = "shop-item upgrade-item" + (canBuy ? " affordable" : " locked");
        div.innerHTML = `
          <span class="shop-icon">⬆️</span>
          <div class="shop-info">
            <strong>${u.name}</strong>
            <span class="shop-desc">${u.desc}</span>
            <span class="shop-cost">🍬 ${fmt(u.cost)}</span>
          </div>
        `;
        div.addEventListener("click", () => buyUpgrade(i));
        upgradeListEl.appendChild(div);
      });
    }

    // ====== RENDER OWNED LIST ======
    function renderOwned() {
      ownedList.innerHTML = "";
      buildings.forEach(b => {
        if (b.owned > 0) {
          const li = document.createElement("li");
          li.textContent = `${b.icon} ${b.name}: ${b.owned}`;
          ownedList.appendChild(li);
        }
      });
    }

    // ====== BUY BUILDING ======
    function buyBuilding(i) {
      const b    = buildings[i];
      const cost = getBuildingCost(b);
      if (candy >= cost) {
        candy -= cost;
        b.owned++;
        recalcCPS();
        updateUI();
      }
    }

    // ====== BUY UPGRADE ======
    function buyUpgrade(i) {
      const u = upgrades[i];
      if (candy >= u.cost && !u.bought) {
        candy -= u.cost;
        u.bought = true;
        candyPerClick *= u.mult;
        updateUI();
      }
    }

    // ====== RECALCULATE CPS ======
    function recalcCPS() {
      candyPerSecond = 0;
      buildings.forEach(b => {
        candyPerSecond += b.cps * b.owned;
      });
      candyPerSecond = Math.round(candyPerSecond * 10) / 10;
    }

    // ====== CLICK HANDLER ======
    bucket.addEventListener("click", (e) => {
      candy      += candyPerClick;
      totalCandy += candyPerClick;

      bucket.classList.remove("bounce");
      void bucket.offsetWidth;
      bucket.classList.add("bounce");

      spawnFloat(e, candyPerClick);
      updateUI();
    });

    // ====== FLOATING TEXT ======
    function spawnFloat(e, amount) {
      const el = document.createElement("div");
      el.className = "float-candy";
      el.textContent = "+" + fmt(amount);
      el.style.left = (e.clientX - 20 + Math.random() * 40 - 20) + "px";
      el.style.top  = (e.clientY - 20) + "px";
      floatContainer.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    // ====== GAME LOOP (ticks 10x per second) ======
    setInterval(() => {
      candy      += candyPerSecond / 10;
      totalCandy += candyPerSecond / 10;
      updateUI();
    }, 100);

    // ====== SAVE / LOAD ======
    function saveGame() {
      const state = {
        candy,
        candyPerClick,
        totalCandy,
        buildings: buildings.map(b => b.owned),
        upgrades:  upgrades.map(u => u.bought)
      };
      localStorage.setItem("candyClickerSave", JSON.stringify(state));
    }

    function loadGame() {
      const raw = localStorage.getItem("candyClickerSave");
      if (!raw) return;
      try {
        const s = JSON.parse(raw);
        candy         = s.candy         || 0;
        candyPerClick = s.candyPerClick || 1;
        totalCandy    = s.totalCandy    || 0;
        s.buildings.forEach((owned, i) => { if (buildings[i]) buildings[i].owned = owned; });
        s.upgrades.forEach((bought, i) => { if (upgrades[i]) upgrades[i].bought = bought; });
        recalcCPS();
        updateUI();
      } catch(e) {}
    }

    setInterval(saveGame, 30000);
    loadGame();
    updateUI();
  </script>

</body>
</html>
